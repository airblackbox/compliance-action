name: 'AIR Blackbox - EU AI Act Compliance Check'
description: 'Scan your Python AI code for EU AI Act technical compliance. Checks Articles 9, 10, 11, 12, 14, 15.'
author: 'AIR Blackbox (github.com/airblackbox)'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  path:
    description: 'Path to scan (default: entire repo)'
    required: false
    default: '.'
  fail-on-findings:
    description: 'Fail the workflow if compliance gaps are found'
    required: false
    default: 'false'
  output-format:
    description: 'Output format: text, json, or sarif'
    required: false
    default: 'text'
  min-score:
    description: 'Minimum compliance score (0-100) to pass. Only used when fail-on-findings is true.'
    required: false
    default: '0'

outputs:
  score:
    description: 'Overall compliance score (0-100)'
    value: ${{ steps.scan.outputs.score }}
  checks-passed:
    description: 'Number of checks passed (out of 6)'
    value: ${{ steps.scan.outputs.checks_passed }}
  report-path:
    description: 'Path to the full compliance report'
    value: ${{ steps.scan.outputs.report_path }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install AIR Blackbox
      shell: bash
      run: |
        pip install air-blackbox --quiet
        echo "✅ AIR Blackbox installed"

    - name: Run compliance scan
      id: scan
      shell: bash
      run: |
        echo "🔍 Scanning ${{ inputs.path }} for EU AI Act compliance..."
        echo ""

        REPORT_PATH="${{ runner.temp }}/air-blackbox-report"

        air-blackbox comply \
          --path "${{ inputs.path }}" \
          --format "${{ inputs.output-format }}" \
          --output "${REPORT_PATH}" \
          2>&1 | tee scan_output.txt || true

        SCORE=$(grep -oP 'Score: \K[0-9]+' scan_output.txt 2>/dev/null || echo "0")
        PASSED=$(grep -oP 'Passed: \K[0-9]+' scan_output.txt 2>/dev/null || echo "0")

        echo "score=${SCORE}" >> $GITHUB_OUTPUT
        echo "checks_passed=${PASSED}" >> $GITHUB_OUTPUT
        echo "report_path=${REPORT_PATH}" >> $GITHUB_OUTPUT

        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  AIR Blackbox — EU AI Act Compliance Report"
        echo "  Score: ${SCORE}/100  |  Checks: ${PASSED}/6"
        echo "  Deadline: August 2, 2026"
        echo "  https://github.com/airblackbox"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    - name: Check threshold
      if: inputs.fail-on-findings == 'true'
      shell: bash
      run: |
        SCORE="${{ steps.scan.outputs.score }}"
        MIN="${{ inputs.min-score }}"
        if [ "${SCORE}" -lt "${MIN}" ]; then
          echo "❌ Compliance score ${SCORE} is below minimum threshold ${MIN}"
          exit 1
        fi
        echo "✅ Compliance score ${SCORE} meets minimum threshold ${MIN}"
