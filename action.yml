name: 'AIR Blackbox - EU AI Act Compliance Check'
description: 'Scan your Python AI code for EU AI Act technical compliance. Checks Articles 9, 10, 11, 12, 14, 15.'
author: 'AIR Blackbox (github.com/airblackbox)'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  path:
    description: 'Path to scan (default: entire repo)'
    required: false
    default: '.'
  fail-on-findings:
    description: 'Fail the workflow if any checks fail'
    required: false
    default: 'false'
  output-format:
    description: 'Output format: table or json'
    required: false
    default: 'table'
  max-failures:
    description: 'Maximum allowed failures before the action fails (only when fail-on-findings is true)'
    required: false
    default: '0'

outputs:
  passing:
    description: 'Number of checks passing'
    value: ${{ steps.scan.outputs.passing }}
  warnings:
    description: 'Number of warnings'
    value: ${{ steps.scan.outputs.warnings }}
  failing:
    description: 'Number of checks failing'
    value: ${{ steps.scan.outputs.failing }}
  total:
    description: 'Total number of checks'
    value: ${{ steps.scan.outputs.total }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install AIR Blackbox
      shell: bash
      run: |
        pip install air-blackbox --quiet
        echo "✅ AIR Blackbox installed"

    - name: Run compliance scan
      id: scan
      shell: bash
      run: |
        echo "🔍 Scanning ${{ inputs.path }} for EU AI Act compliance..."
        echo ""

        air-blackbox comply \
          --scan "${{ inputs.path }}" \
          --format "${{ inputs.output-format }}" \
          -v \
          2>&1 | tee /tmp/air-scan-output.txt || true

        SUMMARY=$(grep -oP '\d+ passing.*\d+ checks' /tmp/air-scan-output.txt || echo "0 passing 0 warnings 0 failing out of 0 checks")

        PASSING=$(echo "$SUMMARY" | grep -oP '^\d+' || echo "0")
        WARNINGS=$(echo "$SUMMARY" | grep -oP '\d+(?= warnings)' || echo "0")
        FAILING=$(echo "$SUMMARY" | grep -oP '\d+(?= failing)' || echo "0")
        TOTAL=$(echo "$SUMMARY" | grep -oP '\d+(?= checks)' || echo "0")

        echo "passing=${PASSING}" >> $GITHUB_OUTPUT
        echo "warnings=${WARNINGS}" >> $GITHUB_OUTPUT
        echo "failing=${FAILING}" >> $GITHUB_OUTPUT
        echo "total=${TOTAL}" >> $GITHUB_OUTPUT

        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  AIR Blackbox — EU AI Act Compliance Report"
        echo "  ✅ ${PASSING} passing  ⚠️ ${WARNINGS} warnings  ❌ ${FAILING} failing"
        echo "  Total: ${TOTAL} checks  |  Deadline: August 2, 2026"
        echo "  https://github.com/airblackbox"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    - name: Check threshold
      if: inputs.fail-on-findings == 'true'
      shell: bash
      run: |
        FAILING="${{ steps.scan.outputs.failing }}"
        MAX="${{ inputs.max-failures }}"
        if [ "${FAILING}" -gt "${MAX}" ]; then
          echo "❌ ${FAILING} compliance failures exceeds maximum allowed (${MAX})"
          exit 1
        fi
        echo "✅ ${FAILING} failures within allowed threshold (${MAX})"
