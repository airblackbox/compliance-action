# .github/workflows/eu-ai-act-compliance.yml
#
# Scans your Python AI code for EU AI Act technical compliance
# using AIR Blackbox (https://github.com/airblackbox)
#
# Two-tier scoring: static checks (code patterns) vs runtime checks (gateway/trust layer)

name: EU AI Act Compliance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compliance-scan:
    runs-on: ubuntu-latest
    name: AIR Blackbox Compliance Check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run EU AI Act compliance scan
        id: compliance
        uses: airblackbox/compliance-action@v1
        with:
          # Uncomment to fail PRs below a threshold:
          # fail-on-findings: 'true'
          # min-score: 60

      - name: Print results
        run: |
          echo "Score: ${{ steps.compliance.outputs.score }} (${{ steps.compliance.outputs.score-percent }}%)"
          echo "Static: ${{ steps.compliance.outputs.static-passing }}/${{ steps.compliance.outputs.static-total }}"
          echo "Runtime: ${{ steps.compliance.outputs.runtime-passing }}/${{ steps.compliance.outputs.runtime-total }}"
          echo "Frameworks: ${{ steps.compliance.outputs.frameworks }}"
